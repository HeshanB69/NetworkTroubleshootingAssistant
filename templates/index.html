<!DOCTYPE html>
<html>
<head>
    <title>Network Troubleshooting Assistant</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            padding:30px;
        }

        .container{
            max-width:700px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
        }

        .card{
            padding:15px;
            margin:10px 0;
            background:#eef;
            border-radius:8px;
        }
    </style>

</head>
<body>

<div class="container">

    <h1>Network Troubleshooting Assistant</h1>

    <div class="card">
        <strong>IP Address:</strong>
        {{ data.ip }}
    </div>

    <div class="card">
        <strong>Internet Status:</strong>
        {{ data.internet }}
    </div>

    <div class="card">
        <strong>DNS Status:</strong>
        {{ data.dns }}
    </div>

    <div class="card">
        <strong>Gateway:</strong>
        {{ data.gateway }}
    </div>
    <div class="card">
    <strong>Gateway Status:</strong>
    {{ data.gateway_status }}
</div>
<div class="card">
    <strong>Recommendation:</strong><br><br>
    {{ data.recommendation }}
</div>

</div>

</body>
</html>
